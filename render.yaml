services:
  - type: web
    name: placementpro-hub
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PLACEMENTPRO_DB_PATH
        value: /var/data/placementpro.db
      - key: PLACEMENTPRO_ENABLE_EXTERNAL_AI
        value: "1"
      - key: PLACEMENTPRO_PRIMARY_LLM
        value: groq
      - key: PLACEMENTPRO_MAX_LLM_DECISIONS_PER_CYCLE
        value: "12"
      - key: PLACEMENTPRO_GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: PLACEMENTPRO_GEMINI_MODEL
        value: gemini-1.5-flash
      - key: PLACEMENTPRO_FRONTEND_BASE_URL
        value: https://placementpro-hub.onrender.com
    disk:
      name: placementpro-data
      mountPath: /var/data
      sizeGB: 1

